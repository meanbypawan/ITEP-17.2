<html>
  <head>
      <title>Create ToDo</title>
      {%include "__bootstrap.html"%}
  </head>
  <body>
   {%include "__navigation.html"%}
  <div class="container mt-4">
      {%if message%}
        <div class="alert alert-success">{{message}}</div>
      {%endif%}
      <form method="post" action="/update-to-do">
          <input type="hidden" name="id" value="{{todo.id}}"/>
          <div class="form-group">
            <label>Select task priority</label>
              <select name="priority" class="form-control">
                  <option value="{{todo.priority}}" selected>{{todo.priority}}</option>
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
              </select>
          </div>
          <div class="form-group">
              <label>Enter task title</label>
              <input value="{{todo.title}}" name="title" type="text" placeholder="Enter task title" class="form-control"/>
          </div>
          <div class="form-group">
              <label>Write about task</label>
              <textarea name="description" class="form-control">{{todo.description}}</textarea>
          </div>
          <div class="form-group">
              <button type="submit" class="btn btn-secondary">Update</button>
          </div>
      </form>
  </div>
  </body>
</html>
